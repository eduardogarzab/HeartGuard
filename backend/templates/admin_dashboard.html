<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Administración - Heartguard</title>
  <link rel="stylesheet" href="/static/css/admin.css">
</head>
<body>
  <header>
    <h1>Heartguard - Panel de Administración</h1>
    <button id="logout-btn" class="btn-logout">Cerrar Sesión</button>
  </header>

  <div class="container">
    <h2>Dar de Alta Paciente</h2>
    <form id="alta-form">
      <input type="text" id="nombre" placeholder="Nombre" required>
      <input type="number" id="edad" placeholder="Edad" required>
      <select id="sexo">
        <option value="M">Masculino</option>
        <option value="F">Femenino</option>
      </select>
      <input type="number" step="0.01" id="altura" placeholder="Altura (cm)" required>
      <input type="number" step="0.01" id="peso" placeholder="Peso (kg)" required>
      <input type="text" id="username" placeholder="Usuario" required>
      <input type="password" id="password" placeholder="Contraseña" required>
      <button type="submit">Crear Paciente</button>
    </form>

    <h2>Pacientes Registrados</h2>
    <table id="tabla-pacientes">
      <thead>
        <tr>
          <th>ID</th><th>Nombre</th><th>Edad</th><th>Sexo</th><th>Altura</th><th>Peso</th><th>Usuario</th><th>Acción</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <script src="/static/js/admin.js"></script>
</body>
</html>
